name = "datetime-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# Production D1 (timeanddatepro-full — the 5,081-city canonical DB)
[[d1_databases]]
binding = "DB"
database_name = "timeanddatepro-full"
database_id = "c401ffb6-51db-49e6-991f-b5695f9e6a7d"

[vars]
API_VERSION = "2.0.0"
DB_VERSION = "2.3.0"
ALLOWED_ORIGINS = "https://dateandtime.live,https://tdp-landing-dev.nsura2029.workers.dev,http://localhost:5173"

# ============== Dev (bound to the same DB) ==============
[env.dev]
name = "datetime-api-dev"

# Same DB — we want the dev API to talk to the same full dataset
[[env.dev.d1_databases]]
binding = "DB"
database_name = "timeanddatepro-full"
database_id = "c401ffb6-51db-49e6-991f-b5695f9e6a7d"

[env.dev.vars]
API_VERSION = "2.0.0"
DB_VERSION = "2.3.0"
ALLOWED_ORIGINS = "https://dateandtime.live,https://tdp-landing-dev.nsura2029.workers.dev,https://develop.timeanddatepro-dev.pages.dev,http://localhost:5173"
