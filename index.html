<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TimeAndDatePro</title>
  <meta name="description" content="TimeAndDatePro — local time, day, and date. 190 cities, live from your browser." />
  <meta name="theme-color" content="#5b4aaf" />
  <meta property="og:title" content="TimeAndDatePro" />
  <meta property="og:description" content="Time, day, date. Everywhere." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="canonical" href="https://dateandtime.live/" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />

  <!-- Suppress noise from third-party browser-extension scripts -->
  <script>
    (function () {
      const NOISE = /(share-modal\.js|frame start\.js|chrome-extension|moz-extension)/i;
      window.addEventListener("error", function (e) {
        const src = ((e.filename || "") + " " + (e.message || "")).trim();
        if (NOISE.test(src)) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        const reason = String((e.reason && (e.reason.stack || e.reason.message)) || e.reason || "");
        if (NOISE.test(reason)) { e.preventDefault(); e.stopImmediatePropagation(); }
      });
    })();
  </script>

  <style>
    /* ============================================================
       Widgetly design tokens — NotebookLM
       ============================================================ */
    :root, [data-theme="light"] {
      --color-primary: #5b4aaf;
      --color-primary-fg: #ffffff;
      --color-foreground: #49445f;
      --color-foreground-soft: #6b6585;
      --color-muted: #77718f;
      --color-muted-soft: #9a92b0;
      --color-border: rgba(92,74,175,.16);
      --color-border-soft: rgba(92,74,175,.08);
      --color-background: #ffffff;
      --color-background-soft: #faf8ff;
      --color-glow: drop-shadow(0 5px 8px rgba(91,77,145,.10));
      --color-on-segment: #47435f;
      --color-off-segment: transparent;
      --color-off-segment-border: transparent;
      --color-off-segment-border-opacity: 0;
      --color-off-segment-opacity: 0;
      --color-period-bg: rgba(255,255,255,.76);
      --color-period-fg: #49445f;
      --color-period-border: rgba(87,69,165,.14);
      --color-period-shadow: 0 8px 24px rgba(97,76,160,.18);
      --color-page-texture:
        radial-gradient(circle at 12% 18%, rgba(255,216,170,.92), transparent 27%),
        radial-gradient(circle at 83% 15%, rgba(197,220,255,.95), transparent 31%),
        radial-gradient(circle at 75% 82%, rgba(221,202,255,.92), transparent 28%),
        radial-gradient(circle at 24% 82%, rgba(202,242,229,.78), transparent 30%),
        linear-gradient(135deg,#fff8ef 0%,#f4f3ff 46%,#edf7ff 100%);
      --color-nav-underline: linear-gradient(90deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      --color-logo-gradient: linear-gradient(135deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      --color-button-primary: linear-gradient(135deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      color-scheme: light;
    }
    [data-theme="dark"] {
      --color-primary: #a78bfa;
      --color-primary-fg: #0f0a1f;
      --color-foreground: #ede9fe;
      --color-foreground-soft: #d6cef5;
      --color-muted: #a599c5;
      --color-muted-soft: #6b6585;
      --color-border: rgba(167,139,250,.18);
      --color-border-soft: rgba(167,139,250,.10);
      --color-background: #0f0820;
      --color-background-soft: #16092e;
      --color-glow: drop-shadow(0 0 12px rgba(249,115,22,.25));
      --color-on-segment: #f97316;
      --color-off-segment: transparent;
      --color-off-segment-border: transparent;
      --color-off-segment-border-opacity: 0;
      --color-off-segment-opacity: 0;
      --color-period-bg: rgba(31,10,62,.7);
      --color-period-fg: #f97316;
      --color-period-border: rgba(249,115,22,.30);
      --color-period-shadow: 0 4px 18px rgba(249,115,22,.20);
      --color-page-texture:
        radial-gradient(circle at 18% 22%, rgba(139,92,246,.30), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(99,102,241,.20), transparent 28%),
        radial-gradient(circle at 75% 80%, rgba(168,85,247,.22), transparent 30%),
        radial-gradient(circle at 22% 78%, rgba(59,130,246,.15), transparent 28%),
        linear-gradient(160deg, #0f0820 0%, #1f0a3e 50%, #0a0418 100%);
      --color-nav-underline: linear-gradient(90deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      --color-logo-gradient: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      --color-button-primary: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      color-scheme: dark;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; scroll-behavior: smooth; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--color-background);
      color: var(--color-foreground);
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      line-height: 1.55;
      transition: background-color 0.4s ease, color 0.4s ease;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1;
      background: var(--color-page-texture);
      pointer-events: none;
      transition: background 0.4s ease;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; background: none; border: none; padding: 0; color: inherit; }
    ::selection { background: color-mix(in srgb, var(--color-primary) 25%, transparent); }
    :focus-visible { outline: none; box-shadow: 0 0 0 2px var(--color-background), 0 0 0 4px color-mix(in srgb, var(--color-primary) 50%, transparent); }

    .container { width: 100%; margin-inline: auto; padding-inline: 1.5rem; max-width: 1240px; }
    @media (min-width: 640px) { .container { padding-inline: 2rem; } }
    @media (min-width: 1024px) { .container { padding-inline: 2.5rem; } }

    /* ============================================================
       HEADER
       ============================================================ */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--color-background) 75%, transparent);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--color-border);
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 1rem; }
    .logo { display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 0.5rem; background-image: var(--color-logo-gradient); color: white; font-size: 0.875rem; font-weight: 800; font-family: ui-monospace, monospace; box-shadow: 0 4px 14px color-mix(in srgb, var(--color-primary) 30%, transparent); }
    .logo-text { font-size: 1.125rem; letter-spacing: -0.02em; font-weight: 800; }
    .nav-main { display: none; gap: 0.25rem; }
    @media (min-width: 1024px) { .nav-main { display: inline-flex; } }
    .nav-link { position: relative; padding: 0.5rem 0.875rem; font-size: 0.875rem; font-weight: 700; letter-spacing: -0.005em; border-radius: 0.5rem; transition: color 200ms ease; }
    .nav-link:hover { color: var(--color-primary); }
    .nav-link-active { color: var(--color-primary); }
    .nav-link-active::after { content: ""; position: absolute; left: 0.875rem; right: 0.875rem; bottom: 0.25rem; height: 1.5px; background: var(--color-nav-underline); border-radius: 9999px; }
    .now-dot { display: inline-block; width: 6px; height: 6px; border-radius: 9999px; background: #10b981; margin-right: 0.4rem; vertical-align: middle; position: relative; }
    .now-dot::after { content: ""; position: absolute; inset: -3px; border-radius: 9999px; background: #10b981; opacity: 0.3; animation: ping 1.6s cubic-bezier(0, 0, 0.2, 1) infinite; }
    @keyframes ping { 75%, 100% { transform: scale(2.2); opacity: 0; } }
    .header-actions { display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; white-space: nowrap; font-size: 0.875rem; font-weight: 700; letter-spacing: -0.005em; transition: all 200ms ease; text-decoration: none; border: 1px solid transparent; height: 40px; padding: 0 1rem; cursor: pointer; border-radius: 9999px; }
    .btn-sm { height: 34px; padding: 0 0.75rem; font-size: 0.8125rem; }
    .btn-primary { color: var(--color-primary-fg); background-image: var(--color-button-primary); box-shadow: 0 4px 14px color-mix(in srgb, var(--color-primary) 25%, transparent); }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost { color: var(--color-foreground); }
    .btn-ghost:hover { color: var(--color-primary); }
    .theme-toggle { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem; background: var(--color-period-bg); backdrop-filter: blur(8px); border: 1px solid var(--color-border); border-radius: 9999px; }
    .theme-toggle button { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 9999px; color: var(--color-muted); transition: all 200ms ease; }
    .theme-toggle button svg { width: 0.95rem; height: 0.95rem; }
    .theme-toggle button[aria-pressed="true"] { background: var(--color-button-primary); color: white; box-shadow: 0 2px 8px color-mix(in srgb, var(--color-primary) 30%, transparent); }

    /* ============================================================
       LANDING HERO — centered time
       ============================================================ */
    main.landing {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: clamp(2rem, 6vw, 4rem) 1.5rem clamp(3rem, 8vw, 5rem);
    }
    .seg-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      max-width: 1100px;
    }
    .seg-row {
      --main-digit-width: clamp(64px, 10vw, 130px);
      --small-digit-width: clamp(28px, 4vw, 56px);
      --digit-gap: clamp(6px, 0.8vw, 10px);
      --colon-width: clamp(14px, 1.6vw, 22px);
      --colon-side-space: clamp(8px, 1.2vw, 16px);
      --period-width: clamp(48px, 6vw, 78px);

      display: grid;
      grid-template-columns:
        calc((var(--main-digit-width) * 2) + var(--digit-gap))
        calc(var(--colon-width) + (var(--colon-side-space) * 2))
        calc((var(--main-digit-width) * 2) + var(--digit-gap))
        calc(var(--colon-width) + (var(--colon-side-space) * 2))
        calc((var(--main-digit-width) * 2) + var(--digit-gap))
        var(--period-width);

      align-items: end;
      justify-content: center;
      width: 100%;
      white-space: nowrap;
    }
    .seg-digit-group { display: flex; align-items: flex-end; gap: var(--digit-gap); flex: 0 0 auto; }
    .seg-digit {
      --width: var(--main-digit-width);
      --height: calc(var(--width) * 1.82);
      --thickness: calc(var(--width) * .18);
      position: relative;
      width: var(--width);
      height: var(--height);
      min-width: var(--width);
      max-width: var(--width);
      flex: 0 0 var(--width);
      filter: var(--color-glow);
    }
    .seg { position: absolute; background: var(--color-off-segment); border: 1px solid color-mix(in srgb, var(--color-off-segment-border) calc(var(--color-off-segment-border-opacity) * 100%), transparent); opacity: var(--color-off-segment-opacity); transition: background 45ms linear, border-color 45ms linear, opacity 45ms linear, box-shadow 45ms linear; }
    [data-theme="dark"] .seg { box-shadow: inset 0 0 0 0.5px rgba(0,0,0,.4); }
    .seg.on { z-index: 1; background: var(--color-on-segment); border-color: transparent; opacity: 1; box-shadow: 0 0 6px color-mix(in srgb, var(--color-on-segment) 35%, transparent); }
    .seg.horizontal { left: var(--thickness); width: calc(100% - (var(--thickness) * 2)); height: var(--thickness); clip-path: polygon(10% 0, 90% 0, 100% 50%, 90% 100%, 10% 100%, 0 50%); }
    .seg.vertical { width: var(--thickness); height: calc(50% - (var(--thickness) * 0.55)); clip-path: polygon(0 8%, 50% 0, 100% 8%, 100% 92%, 50% 100%, 0 92%); }
    .seg.a { top: 0; }
    .seg.g { top: 50%; transform: translateY(-50%); }
    .seg.d { bottom: 0; }
    .seg.f { top: calc(var(--thickness) * 0.42); left: 0; }
    .seg.b { top: calc(var(--thickness) * 0.42); right: 0; }
    .seg.e { bottom: calc(var(--thickness) * 0.42); left: 0; }
    .seg.c { right: 0; bottom: calc(var(--thickness) * 0.42); }
    .seg-digit.is-one .seg.b, .seg-digit.is-one .seg.c { right: calc(50% - (var(--thickness) / 2)); }
    .seg-colon {
      position: relative;
      align-self: end;
      justify-self: center;
      width: var(--colon-width);
      height: calc(var(--main-digit-width) * 1.82);
      margin: 0;
      filter: var(--color-glow);
    }
    .seg-colon::before, .seg-colon::after { content: ""; position: absolute; left: 50%; width: 0.6rem; height: 0.6rem; border-radius: 3px; background: var(--color-on-segment); transform: translateX(-50%); }
    .seg-colon::before { top: 27%; } .seg-colon::after { bottom: 27%; }
    .seg-period {
      width: var(--period-width);
      margin: 0 0 clamp(5px, 0.7vw, 9px);
      padding: 0;
      border: 0;
      background: transparent;
      color: var(--color-period-fg);
      font-family: "Courier New", ui-monospace, monospace;
      font-size: clamp(0.7rem, 1.15vw, 0.95rem);
      font-weight: 800;
      letter-spacing: 0.22em;
      line-height: 1;
      white-space: nowrap;
      align-self: end;
      justify-self: start;
    }
    .seg-period.is-hidden { visibility: hidden; opacity: 0; pointer-events: none; }
    .seg-date {
      margin-top: clamp(1.5rem, 3vw, 2.5rem);
      color: var(--color-foreground);
      font-family: "Courier New", ui-monospace, monospace;
      font-size: clamp(1rem, 2.4vw, 1.875rem);
      font-weight: 800;
      letter-spacing: 0.09em;
      text-align: center;
    }
    .seg-format-toggle {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.25rem;
      background: var(--color-period-bg);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      margin-top: 1.25rem;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .seg-format-toggle button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.4rem 0.85rem;
      border-radius: 9999px;
      font-family: ui-monospace, monospace;
      font-size: 0.6875rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--color-muted);
      transition: all 200ms ease;
    }
    .seg-format-toggle button[aria-pressed="true"] {
      background: var(--color-button-primary);
      color: white;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--color-primary) 30%, transparent);
    }

    /* ============================================================
       Responsive
       ============================================================ */
    @media (max-width: 1023px) and (min-width: 761px) {
      .header-row { gap: 0.5rem; }
      .nav-main { gap: 0; }
      .nav-link { padding: 0.5rem 0.5rem; font-size: 0.8125rem; }
    }
    @media (max-width: 760px) {
      .header-row { height: 56px; }
      .nav-main { display: none !important; }
      .btn { height: 36px; padding: 0 0.75rem; font-size: 0.8125rem; }
      .btn-sm { height: 32px; padding: 0 0.625rem; font-size: 0.75rem; }
      .logo-text { font-size: 1rem; }
      .logo-mark { width: 28px; height: 28px; font-size: 0.8125rem; }
      main.landing { padding-top: 1.5rem; }
      .seg-row { --colon-width: 10px; --colon-side-space: 6px; --period-width: 36px; }
      .seg-colon::before, .seg-colon::after { width: 0.4rem; height: 0.4rem; }
      .seg-date { font-size: 0.95rem; margin-top: 1.25rem; }
      .seg-format-toggle { margin-top: 1rem; }
      .seg-format-toggle button { padding: 0.35rem 0.7rem; font-size: 0.625rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-row">
      <a href="/" class="logo" aria-label="TimeAndDatePro home">
        <span class="logo-mark">T</span>
        <span class="logo-text">TimeAndDatePro</span>
      </a>
      <nav class="nav-main" aria-label="Main">
        <a href="/" class="nav-link nav-link-active"><span class="now-dot" aria-hidden="true"></span>Today</a>
        <a href="/globe/" class="nav-link">3D Globe</a>
        <a href="#" class="nav-link">Meeting finder</a>
        <a href="#" class="nav-link">World clock</a>
        <a href="#" class="nav-link">Blog</a>
      </nav>
      <div class="header-actions">
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button id="theme-light" aria-pressed="true" aria-label="Light mode" title="Light mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </button>
          <button id="theme-dark" aria-pressed="false" aria-label="Dark mode" title="Dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <a href="/" class="btn btn-ghost btn-sm">Home</a>
        <a href="#" class="btn btn-primary btn-sm">Get started</a>
      </div>
    </div>
  </header>

  <main class="landing">
    <section class="seg-card" aria-label="Local current time">
      <div class="seg-row" aria-label="Live current time">
        <div id="hours" class="seg-digit-group"></div>
        <div class="seg-colon" aria-hidden="true"></div>
        <div id="minutes" class="seg-digit-group"></div>
        <div class="seg-colon" aria-hidden="true"></div>
        <div id="seconds" class="seg-digit-group"></div>
        <div id="period" class="seg-period is-hidden">AM</div>
      </div>
      <div class="seg-date" id="date">—</div>
      <div class="seg-format-toggle" role="group" aria-label="Time format">
        <button id="format-12" type="button" aria-pressed="false">12h</button>
        <button id="format-24" type="button" aria-pressed="true">24h</button>
      </div>
    </section>
  </main>

  <script>
    // ============================================================
    // Seven-segment digit patterns
    // ============================================================
    const DIGIT_PATTERNS = {
      0: ["a","b","c","d","e","f"],
      1: ["b","c"],
      2: ["a","b","g","e","d"],
      3: ["a","b","c","d","g"],
      4: ["f","g","b","c"],
      5: ["a","f","g","c","d"],
      6: ["a","f","g","e","c","d"],
      7: ["a","b","c"],
      8: ["a","b","c","d","e","f","g"],
      9: ["a","b","c","d","f","g"]
    };
    const WEEKDAYS = ["SUN","MON","TUE","WED","THU","FRI","SAT"];
    const MONTHS = ["JAN","FEB","MAR","APR","MAY","JUN","JUL","AUG","SEP","OCT","NOV","DEC"];

    let use24Hour = true;

    // ============================================================
    // Build digits
    // ============================================================
    function createDigit(parent) {
      const digit = document.createElement("div");
      digit.className = "seg-digit";
      ["a","b","c","d","e","f","g"].forEach(name => {
        const seg = document.createElement("span");
        const orientation = ["a","g","d"].includes(name) ? "horizontal" : "vertical";
        seg.className = `seg ${orientation} ${name}`;
        digit.appendChild(seg);
      });
      parent.appendChild(digit);
      return digit;
    }
    const hourDigits = [createDigit(document.getElementById("hours")), createDigit(document.getElementById("hours"))];
    const minuteDigits = [createDigit(document.getElementById("minutes")), createDigit(document.getElementById("minutes"))];
    const secondDigits = [createDigit(document.getElementById("seconds")), createDigit(document.getElementById("seconds"))];

    // ============================================================
    // Render a single digit
    // ============================================================
    function renderDigit(el, n) {
      const active = new Set(DIGIT_PATTERNS[n] || []);
      el.classList.toggle("is-one", Number(n) === 1);
      el.querySelectorAll(".seg").forEach(seg => {
        const name = [...seg.classList].find(c => /^[a-g]$/.test(c));
        seg.classList.toggle("on", active.has(name));
      });
    }
    function renderTwoDigits(els, v) {
      const s = String(v).padStart(2, "0");
      renderDigit(els[0], Number(s[0]));
      renderDigit(els[1], Number(s[1]));
    }

    // ============================================================
    // Clock tick
    // ============================================================
    function updateClock() {
      const now = new Date();
      const rawHours = now.getHours();
      const period = rawHours >= 12 ? "PM" : "AM";
      const periodEl = document.getElementById("period");

      if (use24Hour) {
        periodEl.classList.add("is-hidden");
        renderTwoDigits(hourDigits, rawHours);
      } else {
        periodEl.classList.remove("is-hidden");
        periodEl.textContent = period;
        renderTwoDigits(hourDigits, rawHours % 12 || 12);
      }

      renderTwoDigits(minuteDigits, now.getMinutes());
      renderTwoDigits(secondDigits, now.getSeconds());
      document.getElementById("date").textContent = `${WEEKDAYS[now.getDay()]} · ${MONTHS[now.getMonth()]} ${String(now.getDate()).padStart(2, "0")} · ${now.getFullYear()}`;
      requestAnimationFrame(updateClock);
    }

    // ============================================================
    // Theme toggle (set up BEFORE first render so localStorage is honored)
    // ============================================================
    const root = document.documentElement;
    const btnLight = document.getElementById("theme-light");
    const btnDark = document.getElementById("theme-dark");
    function setTheme(theme) {
      root.setAttribute("data-theme", theme);
      btnLight.setAttribute("aria-pressed", String(theme === "light"));
      btnDark.setAttribute("aria-pressed", String(theme === "dark"));
      try { localStorage.setItem("tdp-landing-theme", theme); } catch (e) {}
    }
    btnLight.addEventListener("click", () => setTheme("light"));
    btnDark.addEventListener("click", () => setTheme("dark"));
    let savedTheme = null;
    try { savedTheme = localStorage.getItem("tdp-landing-theme"); } catch (e) {}
    if (savedTheme === "dark" || savedTheme === "light") {
      setTheme(savedTheme);
    } else if (window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches) {
      setTheme("dark");
    }

    // ============================================================
    // 12h/24h format toggle (set up BEFORE first render so localStorage is honored)
    // ============================================================
    const btn12 = document.getElementById("format-12");
    const btn24 = document.getElementById("format-24");
    function setFormat(fmt) {
      use24Hour = fmt === "24";
      btn12.setAttribute("aria-pressed", String(!use24Hour));
      btn24.setAttribute("aria-pressed", String(use24Hour));
      try { localStorage.setItem("tdp-landing-format", use24Hour ? "24" : "12"); } catch (e) {}
    }
    btn12.addEventListener("click", () => setFormat("12"));
    btn24.addEventListener("click", () => setFormat("24"));
    let savedFormat = null;
    try { savedFormat = localStorage.getItem("tdp-landing-format"); } catch (e) {}
    if (savedFormat === "24" || savedFormat === "12") {
      setFormat(savedFormat);
    }

    // Start the rAF loop
    updateClock();
  </script>
</body>
</html>
