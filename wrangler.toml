name = "dateandtime-live"
main = "src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./"
binding = "ASSETS"
# NOTE: wrangler 4.x ignores the `exclude` field (warning: "Unexpected
# fields found in assets field"). For the landing deploy, the api Worker's
# 98 MB workerd binary in cloudflare/datetime-api/node_modules gets
# included as an asset and trips the 25 MB limit. The scripts/deploy.sh
# helper stashes that directory aside before deploying and restores it
# after. Keep this list here anyway for documentation and for when
# wrangler fixes the bug.
exclude = [
  ".git/**",
  ".wrangler/**",
  ".worktrees/**",
  "node_modules/**",
  "cloudflare/**/node_modules/**",
  "**/README.md",
  "**/*.md",
  "**/wrangler.toml",
  "**/src/**",
  ".gitignore"
]

# Development environment — deploys to the tdp-landing-dev Worker.
# Source is the same as production (the [assets] block above); only the
# Worker name differs so the dev URL stays separate.
#
# NOTE: the Worker name intentionally has no visual similarity to
# "dateandtime.live" — Chrome flags "dateandtime-live-dev" as a lookalike
# of the prod domain. "tdp-landing-dev" reads as its own thing.
[env.dev]
name = "tdp-landing-dev"
