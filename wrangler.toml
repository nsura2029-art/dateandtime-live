name = "dateandtime-live"
main = "src/index.js"
compatibility_date = "2024-09-23"

[assets]
directory = "./"
binding = "ASSETS"
exclude = [
  ".git/**",
  ".wrangler/**",
  ".worktrees/**",
  "node_modules/**",
  "**/README.md",
  "**/*.md",
  "**/wrangler.toml",
  "**/src/**",
  ".gitignore"
]

# Development environment — deploys to the dateandtime-live-dev Worker.
# Source is the same as production (the [assets] block above); only the
# Worker name differs so the dev URL stays separate.
[env.dev]
name = "dateandtime-live-dev"
