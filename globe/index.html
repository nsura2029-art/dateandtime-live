<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3D Globe · TimeAndDatePro</title>
  <meta name="description" content="Interactive 3D globe with 190 cities. Search, click, pin. Live local time from your browser." />
  <meta name="theme-color" content="#5b4aaf" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap"
    rel="stylesheet"
  />
  <!-- Suppress noise from third-party browser-extension scripts -->
  <script>
    (function () {
      const NOISE = /(share-modal\.js|frame start\.js|chrome-extension|moz-extension)/i;
      window.addEventListener("error", function (e) {
        const src = ((e.filename || "") + " " + (e.message || "")).trim();
        if (NOISE.test(src)) { e.preventDefault(); e.stopImmediatePropagation(); return false; }
      }, true);
      window.addEventListener("unhandledrejection", function (e) {
        const reason = String((e.reason && (e.reason.stack || e.reason.message)) || e.reason || "");
        if (NOISE.test(reason)) { e.preventDefault(); e.stopImmediatePropagation(); }
      });
    })();
  </script>

  <style>
    /* ============================================================
       Widgetly design system — NotebookLM tokens
       ============================================================ */
    :root, [data-theme="light"] {
      --color-primary: #5b4aaf;
      --color-primary-fg: #ffffff;
      --color-foreground: #49445f;
      --color-foreground-soft: #6b6585;
      --color-muted: #77718f;
      --color-muted-soft: #9a92b0;
      --color-border: rgba(92,74,175,.16);
      --color-border-soft: rgba(92,74,175,.08);
      --color-background: #ffffff;
      --color-background-soft: #faf8ff;
      --color-glow: drop-shadow(0 5px 8px rgba(91,77,145,.10));
      --color-led: #5b4aaf;
      --color-period-bg: rgba(255,255,255,.76);
      --color-period-fg: #49445f;
      --color-period-border: rgba(87,69,165,.14);
      --color-period-shadow: 0 8px 24px rgba(97,76,160,.18);
      --color-microcopy: #9a92b0;
      --color-code-bg: rgba(255,255,255,.68);
      --color-code-fg: #5b4aaf;
      --color-page-texture:
        radial-gradient(circle at 12% 18%, rgba(255,216,170,.92), transparent 27%),
        radial-gradient(circle at 83% 15%, rgba(197,220,255,.95), transparent 31%),
        radial-gradient(circle at 75% 82%, rgba(221,202,255,.92), transparent 28%),
        radial-gradient(circle at 24% 82%, rgba(202,242,229,.78), transparent 30%),
        linear-gradient(135deg,#fff8ef 0%,#f4f3ff 46%,#edf7ff 100%);
      --color-nav-underline: linear-gradient(90deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      --color-logo-gradient: linear-gradient(135deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      --color-button-primary: linear-gradient(135deg, #5b4aaf 0%, #8b5cf6 50%, #c084fc 100%);
      --globe-bg: radial-gradient(circle at 30% 30%, #ede9fe 0%, #c4b5e0 40%, #5b4aaf 100%);
      --globe-marker: #5b4aaf;
      --globe-marker-pinned: #f97316;
      --globe-marker-hover: #a78bfa;
      --globe-ring: #a78bfa;
      color-scheme: light;
    }
    [data-theme="dark"] {
      --color-primary: #a78bfa;
      --color-primary-fg: #0f0a1f;
      --color-foreground: #ede9fe;
      --color-foreground-soft: #d6cef5;
      --color-muted: #a599c5;
      --color-muted-soft: #6b6585;
      --color-border: rgba(167,139,250,.18);
      --color-border-soft: rgba(167,139,250,.10);
      --color-background: #0f0820;
      --color-background-soft: #16092e;
      --color-glow: drop-shadow(0 0 12px rgba(249,115,22,.25));
      --color-led: #f97316;
      --color-period-bg: rgba(31,10,62,.7);
      --color-period-fg: #f97316;
      --color-period-border: rgba(249,115,22,.30);
      --color-period-shadow: 0 4px 18px rgba(249,115,22,.20);
      --color-microcopy: #6b6585;
      --color-code-bg: #1f0a3e;
      --color-code-fg: #f97316;
      --color-page-texture:
        radial-gradient(circle at 18% 22%, rgba(139,92,246,.30), transparent 30%),
        radial-gradient(circle at 82% 18%, rgba(99,102,241,.20), transparent 28%),
        radial-gradient(circle at 75% 80%, rgba(168,85,247,.22), transparent 30%),
        radial-gradient(circle at 22% 78%, rgba(59,130,246,.15), transparent 28%),
        linear-gradient(160deg, #0f0820 0%, #1f0a3e 50%, #0a0418 100%);
      --color-nav-underline: linear-gradient(90deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      --color-logo-gradient: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      --color-button-primary: linear-gradient(135deg, #a78bfa 0%, #c084fc 50%, #f97316 100%);
      --globe-bg: radial-gradient(circle at 30% 30%, #1f0a3e 0%, #0f0820 40%, #000 100%);
      --globe-marker: #a78bfa;
      --globe-marker-pinned: #f97316;
      --globe-marker-hover: #c084fc;
      --globe-ring: #f97316;
      color-scheme: dark;
    }

    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; text-rendering: optimizeLegibility; scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--color-background);
      color: var(--color-foreground);
      font-family: "Inter", ui-sans-serif, system-ui, sans-serif;
      line-height: 1.55;
      transition: background-color 0.4s ease, color 0.4s ease;
      position: relative;
      min-height: 100vh;
    }
    body::before {
      content: "";
      position: fixed; inset: 0; z-index: -1;
      background: var(--color-page-texture);
      pointer-events: none;
      transition: background 0.4s ease;
    }
    a { color: inherit; text-decoration: none; }
    button { font: inherit; cursor: pointer; background: none; border: none; padding: 0; color: inherit; }
    code { font-family: ui-monospace, monospace; font-size: 0.875em; padding: 0.1rem 0.4rem; background: var(--color-code-bg); color: var(--color-code-fg); border-radius: 4px; }
    ::selection { background: color-mix(in srgb, var(--color-primary) 25%, transparent); }
    :focus-visible { outline: none; box-shadow: 0 0 0 2px var(--color-background), 0 0 0 4px color-mix(in srgb, var(--color-primary) 50%, transparent); }

    .container { width: 100%; margin-inline: auto; padding-inline: 1.5rem; max-width: 1240px; }
    @media (min-width: 640px) { .container { padding-inline: 2rem; } }
    @media (min-width: 1024px) { .container { padding-inline: 2.5rem; } }

    .font-mono { font-family: ui-monospace, monospace; }
    .text-muted { color: var(--color-muted); }
    .text-muted-soft { color: var(--color-muted-soft); }
    .text-led { color: var(--color-led); }
    .text-foreground { color: var(--color-foreground); }
    .text-gradient { background: var(--color-button-primary); -webkit-background-clip: text; background-clip: text; color: transparent; }

    /* HEADER (same as widget-system page) */
    .site-header {
      position: sticky; top: 0; z-index: 50;
      background: color-mix(in srgb, var(--color-background) 75%, transparent);
      backdrop-filter: saturate(180%) blur(14px);
      -webkit-backdrop-filter: saturate(180%) blur(14px);
      border-bottom: 1px solid var(--color-border);
    }
    .header-row { display: flex; align-items: center; justify-content: space-between; height: 64px; gap: 1rem; }
    .logo { display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 600; }
    .logo-mark { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 0.5rem; background-image: var(--color-logo-gradient); color: white; font-size: 0.875rem; font-weight: 800; font-family: ui-monospace, monospace; box-shadow: 0 4px 14px color-mix(in srgb, var(--color-primary) 30%, transparent); }
    .logo-text { font-size: 1.125rem; letter-spacing: -0.02em; font-weight: 800; }
    .nav-main { display: none; gap: 0.25rem; }
    @media (min-width: 1024px) { .nav-main { display: inline-flex; } }
    .nav-link { position: relative; padding: 0.5rem 0.875rem; font-size: 0.875rem; font-weight: 700; letter-spacing: -0.005em; border-radius: 0.5rem; transition: color 200ms ease; }
    .nav-link:hover { color: var(--color-primary); }
    .nav-link-active { color: var(--color-primary); }
    .nav-link-active::after { content: ""; position: absolute; left: 0.875rem; right: 0.875rem; bottom: 0.25rem; height: 1.5px; background: var(--color-nav-underline); border-radius: 9999px; }
    .now-dot { display: inline-block; width: 6px; height: 6px; border-radius: 9999px; background: #10b981; margin-right: 0.4rem; vertical-align: middle; position: relative; }
    .now-dot::after { content: ""; position: absolute; inset: -3px; border-radius: 9999px; background: #10b981; opacity: 0.3; animation: ping 1.6s cubic-bezier(0, 0, 0.2, 1) infinite; }
    @keyframes ping { 75%, 100% { transform: scale(2.2); opacity: 0; } }
    .header-actions { display: inline-flex; align-items: center; gap: 0.5rem; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; white-space: nowrap; font-size: 0.875rem; font-weight: 700; letter-spacing: -0.005em; transition: all 200ms ease; text-decoration: none; border: 1px solid transparent; height: 40px; padding: 0 1rem; cursor: pointer; border-radius: 9999px; }
    .btn-sm { height: 34px; padding: 0 0.75rem; font-size: 0.8125rem; }
    .btn-primary { color: var(--color-primary-fg); background-image: var(--color-button-primary); box-shadow: 0 4px 14px color-mix(in srgb, var(--color-primary) 25%, transparent); }
    .btn-primary:hover { filter: brightness(1.05); }
    .btn-ghost { color: var(--color-foreground); }
    .btn-ghost:hover { color: var(--color-primary); }
    .btn-outline { color: var(--color-foreground); border-color: var(--color-border); background: var(--color-period-bg); backdrop-filter: blur(8px); }
    .btn-outline:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .theme-toggle { display: inline-flex; align-items: center; gap: 0.25rem; padding: 0.25rem; background: var(--color-period-bg); backdrop-filter: blur(8px); border: 1px solid var(--color-border); border-radius: 9999px; }
    .theme-toggle button { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 9999px; color: var(--color-muted); transition: all 200ms ease; }
    .theme-toggle button svg { width: 0.95rem; height: 0.95rem; }
    .theme-toggle button[aria-pressed="true"] { background: var(--color-button-primary); color: white; box-shadow: 0 2px 8px color-mix(in srgb, var(--color-primary) 30%, transparent); }

    /* ============================================================
       3D GLOBE PAGE
       ============================================================ */
    .globe-page { padding: 0 0 4rem; }

    /* Globe + sidebar layout */
    .globe-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      align-items: stretch;
    }
    @media (min-width: 1024px) {
      .globe-layout { grid-template-columns: minmax(0, 1fr) 360px; gap: 2rem; }
    }

    /* Globe container */
    .globe-stage {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      max-height: 75vh;
      background: var(--globe-bg);
      border-radius: 1.25rem;
      overflow: hidden;
      border: 1px solid var(--color-border);
      transition: background 0.4s ease, border-color 0.4s ease;
    }
    @media (min-width: 1024px) { .globe-stage { max-height: 78vh; } }
    #globe-canvas { width: 100%; height: 100%; cursor: grab; }
    #globe-canvas:active { cursor: grabbing; }

    /* Globe overlay: top bar (search + controls) */
    .globe-topbar {
      position: absolute;
      top: 1rem;
      left: 1rem;
      right: 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      z-index: 10;
      pointer-events: none;
    }
    .globe-topbar > * { pointer-events: auto; }
    .search-wrap {
      position: relative;
      flex: 1;
      min-width: 200px;
      max-width: 360px;
    }
    .search-input {
      width: 100%;
      height: 40px;
      padding: 0 2.5rem 0 0.875rem;
      background: color-mix(in srgb, var(--color-background) 88%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
      color: var(--color-foreground);
      font: inherit;
      font-size: 0.875rem;
      transition: border-color 200ms ease;
    }
    .search-input::placeholder { color: var(--color-muted-soft); }
    .search-input:focus { outline: none; border-color: var(--color-primary); }
    .search-icon {
      position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
      color: var(--color-muted-soft);
      width: 1rem; height: 1rem;
      pointer-events: none;
    }
    .search-results {
      position: absolute;
      top: calc(100% + 0.5rem);
      left: 0; right: 0;
      max-height: 320px;
      overflow-y: auto;
      background: var(--color-background);
      border: 1px solid var(--color-border);
      border-radius: 0.75rem;
      box-shadow: 0 16px 48px rgba(15, 10, 31, 0.18);
      display: none;
      z-index: 20;
    }
    .search-results.is-open { display: block; }
    .search-result {
      width: 100%;
      text-align: left;
      padding: 0.5rem 0.875rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      border-bottom: 1px solid var(--color-border-soft);
      transition: background-color 150ms ease;
    }
    .search-result:last-child { border-bottom: 0; }
    .search-result:hover, .search-result:focus { background: var(--color-background-soft); }
    .search-result-name { font-weight: 600; font-size: 0.8125rem; color: var(--color-foreground); }
    .search-result-time { font-family: ui-monospace, monospace; font-size: 0.8125rem; font-weight: 700; color: var(--color-led); }

    .globe-controls {
      display: inline-flex;
      gap: 0.25rem;
      padding: 0.25rem;
      background: color-mix(in srgb, var(--color-background) 88%, transparent);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid var(--color-border);
      border-radius: 9999px;
    }
    .globe-controls button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px; height: 32px;
      border-radius: 9999px;
      color: var(--color-muted);
      transition: all 200ms ease;
      position: relative;
    }
    .globe-controls button:hover { color: var(--color-foreground); background: var(--color-background-soft); }
    .globe-controls button[aria-pressed="true"] { color: var(--color-foreground); }
    .globe-controls button[aria-pressed="true"]::after {
      content: "";
      position: absolute;
      bottom: 4px; left: 50%;
      width: 4px; height: 4px;
      border-radius: 9999px;
      background: var(--color-primary);
      transform: translateX(-50%);
    }
    .globe-controls button svg { width: 1rem; height: 1rem; }

    .globe-loading {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 0.75rem;
      color: var(--color-foreground);
      font-size: 0.875rem;
      background: var(--globe-bg);
      z-index: 2;
      transition: opacity 0.4s ease;
    }
    .globe-loading.is-hidden { opacity: 0; pointer-events: none; }
    .globe-spinner {
      width: 32px; height: 32px;
      border: 2px solid color-mix(in srgb, var(--color-foreground) 20%, transparent);
      border-top-color: var(--color-foreground);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Globe tooltip (custom, since globe.gl needs htmlElements) */
    .globe-tooltip {
      position: fixed;
      pointer-events: none;
      background: color-mix(in srgb, var(--color-background) 92%, transparent);
      backdrop-filter: blur(12px);
      border: 1px solid var(--color-border);
      border-radius: 0.5rem;
      padding: 0.625rem 0.875rem;
      font-size: 0.8125rem;
      color: var(--color-foreground);
      box-shadow: 0 16px 48px rgba(15, 10, 31, 0.22);
      z-index: 30;
      opacity: 0;
      transform: translate(-50%, calc(-100% - 12px));
      transition: opacity 120ms ease;
      white-space: nowrap;
    }
    .globe-tooltip.is-visible { opacity: 1; }
    .globe-tooltip strong { display: block; font-weight: 700; margin-bottom: 0.125rem; }
    .globe-tooltip .tt-meta { font-family: ui-monospace, monospace; font-size: 0.6875rem; color: var(--color-muted); }
    .globe-tooltip .tt-time { font-family: ui-monospace, monospace; font-weight: 700; color: var(--color-led); margin-top: 0.25rem; }

    /* Sidebar */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      min-width: 0;
    }
    .panel {
      background: color-mix(in srgb, var(--color-background) 60%, transparent);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid var(--color-border);
      border-radius: 1rem;
      padding: 1.25rem;
      transition: background-color 0.3s ease, border-color 0.3s ease;
    }
    .panel-flush { padding: 0.75rem; }

    .pinned-list { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 0.125rem; }
    .pinned-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 0.75rem;
      padding: 0.5rem 0.625rem;
      border-radius: 0.5rem;
      transition: background-color 150ms ease;
      cursor: pointer;
    }
    .pinned-item:hover { background: var(--color-background-soft); }
    .pinned-code { font-family: ui-monospace, monospace; font-size: 0.6875rem; font-weight: 700; color: var(--color-muted); letter-spacing: 0.05em; }
    .pinned-time { font-family: ui-monospace, monospace; font-weight: 700; font-size: 1rem; color: var(--color-led); text-align: right; letter-spacing: 0.02em; }
    .pinned-remove {
      flex-shrink: 0;
      width: 22px; height: 22px;
      display: inline-flex; align-items: center; justify-content: center;
      color: var(--color-muted-soft);
      border-radius: 9999px;
      transition: all 150ms ease;
    }
    .pinned-remove:hover { background: color-mix(in srgb, #f97316 15%, transparent); color: #f97316; }
    .pinned-remove svg { width: 0.8125rem; height: 0.8125rem; }

    .panel-empty { padding: 0.5rem; text-align: center; }
    .panel-empty-time { font-family: ui-monospace, monospace; font-size: 0.875rem; color: var(--color-muted-soft); letter-spacing: 0.1em; }

    /* Responsive */
    @media (max-width: 1023px) and (min-width: 761px) {
      .header-row { gap: 0.5rem; }
      .nav-main { gap: 0; }
      .nav-link { padding: 0.5rem 0.5rem; font-size: 0.8125rem; }
    }
    @media (max-width: 760px) {
      .header-row { height: 56px; }
      .nav-main { display: none !important; }
      .btn { height: 36px; padding: 0 0.75rem; font-size: 0.8125rem; }
      .btn-sm { height: 32px; padding: 0 0.625rem; font-size: 0.75rem; }
      .logo-text { font-size: 1rem; }
      .logo-mark { width: 28px; height: 28px; font-size: 0.8125rem; }
      .globe-stage { aspect-ratio: 1 / 1; max-height: 80vh; }
      .globe-topbar { top: 0.5rem; left: 0.5rem; right: 0.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>

<body>
  <!-- HEADER -->
  <header class="site-header">
    <div class="container header-row">
      <a href="/" class="logo" aria-label="TimeAndDatePro home">
        <span class="logo-mark">T</span>
        <span class="logo-text">TimeAndDatePro</span>
      </a>
      <nav class="nav-main" aria-label="Main">
        <a href="/index.html" class="nav-link">Today</a>
        <a href="#globe" class="nav-link nav-link-active"><span class="now-dot" aria-hidden="true"></span>3D Globe</a>
        <a href="#" class="nav-link">Meeting finder</a>
        <a href="#" class="nav-link">World clock</a>
        <a href="#" class="nav-link">Blog</a>
      </nav>
      <div class="header-actions">
        <div class="theme-toggle" role="group" aria-label="Theme">
          <button id="theme-light" aria-pressed="true" aria-label="Light mode" title="Light mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
          </button>
          <button id="theme-dark" aria-pressed="false" aria-label="Dark mode" title="Dark mode">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
        </div>
        <a href="/" class="btn btn-ghost btn-sm">Home</a>
        <a href="#" class="btn btn-primary btn-sm">Get started</a>
      </div>
    </div>
  </header>

  <main class="globe-page">
    <div class="container">
      <div class="globe-layout">
        <!-- Globe -->
        <div class="globe-stage" id="globe-stage">
          <div class="globe-loading" id="globe-loading">
            <div class="globe-spinner"></div>
          </div>
          <div id="globe-canvas"></div>

          <div class="globe-topbar">
            <div class="search-wrap">
              <input
                id="search"
                class="search-input"
                type="search"
                placeholder="Search…"
                autocomplete="off"
                spellcheck="false"
              />
              <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
              <div class="search-results" id="search-results" role="listbox"></div>
            </div>

            <div class="globe-controls" role="group" aria-label="Controls">
              <button id="toggle-daynight" aria-pressed="true" aria-label="Day/night">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
              </button>
              <button id="toggle-autorotate" aria-pressed="true" aria-label="Auto-rotate">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9c2.52 0 4.93 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/></svg>
              </button>
              <button id="reset-view" aria-label="Reset">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 3v18M3 12h18"/></svg>
              </button>
            </div>
          </div>

          <div class="globe-tooltip" id="globe-tooltip" role="tooltip"></div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
          <div class="panel panel-flush">
            <ul class="pinned-list" id="pinned-list"></ul>
            <div class="panel-empty" id="pinned-empty">
              <div class="panel-empty-time">--:--:--</div>
            </div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script type="module">
    import Globe from 'https://esm.sh/globe.gl@2.34.4';

    // ============================================================
    // State
    // ============================================================
    let cities = [];
    let pinned = new Set();
    let autoRotate = true;

    // ============================================================
    // Theme toggle (set up before first render)
    // ============================================================
    const root = document.documentElement;
    const btnLight = document.getElementById('theme-light');
    const btnDark = document.getElementById('theme-dark');
    function setTheme(theme) {
      root.setAttribute('data-theme', theme);
      btnLight.setAttribute('aria-pressed', String(theme === 'light'));
      btnDark.setAttribute('aria-pressed', String(theme === 'dark'));
      try { localStorage.setItem('tdp-globe-theme', theme); } catch (e) {}
    }
    btnLight.addEventListener('click', () => setTheme('light'));
    btnDark.addEventListener('click', () => setTheme('dark'));
    let savedTheme = null;
    try { savedTheme = localStorage.getItem('tdp-globe-theme'); } catch (e) {}
    if (savedTheme === 'dark' || savedTheme === 'light') setTheme(savedTheme);
    else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) setTheme('dark');

    // ============================================================
    // Fetch cities from the live API (with local cache fallback)
    // ============================================================
    const API_URL = 'https://api.dateandtime.live/v1/cities';
    const CACHE_KEY = 'tdp-cities-cache-v1';
    async function loadCities() {
      // Try cache first for instant render
      try {
        const cached = localStorage.getItem(CACHE_KEY);
        if (cached) {
          const parsed = JSON.parse(cached);
          if (Array.isArray(parsed) && parsed.length > 0) {
            cities = parsed;
            initGlobe();
          }
        }
      } catch (e) { /* ignore */ }

      // Then fetch fresh from API
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        const list = json.data || json;
        if (Array.isArray(list) && list.length > 0) {
          cities = list;
          try { localStorage.setItem(CACHE_KEY, JSON.stringify(list)); } catch (e) {}
          if (globe) buildGlobeLayers();
        }
      } catch (e) {
        console.warn('City fetch failed, using cache or fallback', e);
        if (cities.length === 0) {
          cities = [
            { name: 'London', country: 'GB', tz: 'Europe/London', latitude: 51.5074, longitude: -0.1278, is_capital: 1 },
            { name: 'New York', country: 'US', tz: 'America/New_York', latitude: 40.7128, longitude: -74.0060, is_capital: 0 },
            { name: 'Tokyo', country: 'JP', tz: 'Asia/Tokyo', latitude: 35.6762, longitude: 139.6503, is_capital: 1 },
            { name: 'Sydney', country: 'AU', tz: 'Australia/Sydney', latitude: -33.8688, longitude: 151.2093, is_capital: 1 },
            { name: 'Dubai', country: 'AE', tz: 'Asia/Dubai', latitude: 25.2048, longitude: 55.2708, is_capital: 0 },
            { name: 'São Paulo', country: 'BR', tz: 'America/Sao_Paulo', latitude: -23.5505, longitude: -46.6333, is_capital: 0 },
            { name: 'Cape Town', country: 'ZA', tz: 'Africa/Johannesburg', latitude: -33.9249, longitude: 18.4241, is_capital: 1 },
            { name: 'Mumbai', country: 'IN', tz: 'Asia/Kolkata', latitude: 19.0760, longitude: 72.8777, is_capital: 0 },
            { name: 'Reykjavík', country: 'IS', tz: 'Atlantic/Reykjavik', latitude: 64.1466, longitude: -21.9426, is_capital: 1 },
            { name: 'Singapore', country: 'SG', tz: 'Asia/Singapore', latitude: 1.3521, longitude: 103.8198, is_capital: 1 },
          ];
          initGlobe();
        }
      }
    }

    // ============================================================
    // Live time helper (per city, IANA timezone, computed in browser)
    // ============================================================
    function timeIn(tz) {
      try {
        const parts = new Intl.DateTimeFormat('en-GB', {
          timeZone: tz, hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false
        }).formatToParts(new Date());
        const get = (t) => parts.find(p => p.type === t)?.value || '00';
        return `${get('hour')}:${get('minute')}:${get('second')}`;
      } catch (e) { return '--:--:--'; }
    }

    // ============================================================
    // Globe initialization
    // ============================================================
    const container = document.getElementById('globe-canvas');
    let globe;
    function initGlobe() {
      if (globe) return;
      globe = new Globe(container, { animateIn: true, waitForGlobeReady: true })
        .backgroundColor('rgba(0,0,0,0)')
        .showAtmosphere(true)
        .atmosphereColor('rgba(167, 139, 250, 0.35)')
        .atmosphereAltitude(0.18)
        .globeImageUrl('//unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
        .bumpImageUrl('//unpkg.com/three-globe/example/img/earth-topology.png')
        .pointsData(cities)
        .pointLat(d => d.latitude)
        .pointLng(d => d.longitude)
        .pointAltitude(d => (d.is_capital ? 0.025 : 0.012))
        .pointRadius(d => (d.is_capital ? 0.35 : 0.22))
        .pointColor(d => pinned.has(d.id) ? 'rgba(249,115,22,0.95)' : 'rgba(91,74,175,0.9)')
        .pointResolution(8)
        .pointLabel(d => {
          return `<div style="font-family: ui-monospace, monospace; font-size: 12px; font-weight: 700; color: #f97316; text-shadow: 0 0 4px rgba(0,0,0,0.6); white-space: nowrap;">${timeIn(d.tz)}</div>`;
        })
        .onPointClick((d) => {
          togglePin(d);
          globe.pointOfView({ lat: d.latitude, lng: d.longitude, altitude: 1.6 }, 700);
        })
        .onPointHover((d) => {
          container.style.cursor = d ? 'pointer' : 'grab';
        })
        .ringsData([])
        .ringLat(d => d.latitude)
        .ringLng(d => d.longitude)
        .ringMaxRadius(3)
        .ringPropagationSpeed(2.5)
        .ringRepeatPeriod(1500)
        .ringColor(() => 'rgba(167, 139, 250, 0.6)')
        .htmlElementsData([])
        .htmlLat(d => d.latitude)
        .htmlLng(d => d.longitude)
        .htmlAltitude(d => 0.04)
        .htmlElement(d => {
          const el = document.createElement('div');
          el.style.cssText = 'pointer-events: none; color: #f97316; font-family: ui-monospace, monospace; font-size: 10px; font-weight: 700; text-shadow: 0 0 6px rgba(249,115,22,0.5); white-space: nowrap; transform: translate(-50%, -100%);';
          el.textContent = timeIn(d.tz);
          return el;
        })
        .customLayerData(cities.map(c => ({ ...c, _type: 'marker' })))
        .onGlobeReady(() => {
          document.getElementById('globe-loading').classList.add('is-hidden');
          setTimeout(() => document.getElementById('globe-loading').remove(), 600);
          startLiveTick();
        });

      // Auto-rotate
      globe.controls().autoRotate = true;
      globe.controls().autoRotateSpeed = 0.35;
      globe.controls().enableDamping = true;
      globe.controls().dampingFactor = 0.08;
    }

    function buildGlobeLayers() {
      if (!globe) return;
      globe.pointsData(cities);
      globe.customLayerData(cities.map(c => ({ ...c, _type: 'marker' })));
    }

    // ============================================================
    // Pinned cities management
    // ============================================================
    const PIN_KEY = 'tdp-pinned-cities-v1';
    try {
      const saved = JSON.parse(localStorage.getItem(PIN_KEY) || '[]');
      if (Array.isArray(saved)) pinned = new Set(saved);
    } catch (e) {}
    function savePinned() {
      try { localStorage.setItem(PIN_KEY, JSON.stringify([...pinned])); } catch (e) {}
    }
    function togglePin(city) {
      if (pinned.has(city.id)) pinned.delete(city.id);
      else pinned.add(city.id);
      savePinned();
      renderPinned();
      updateGlobeMarkers();
    }
    function updateGlobeMarkers() {
      if (!globe) return;
      globe.pointColor(d => pinned.has(d.id) ? 'rgba(249,115,22,0.95)' : 'rgba(91,74,175,0.9)');
      // Pulse rings on pinned cities
      globe.ringsData(cities.filter(c => pinned.has(c.id)));
    }
    function renderPinned() {
      const list = document.getElementById('pinned-list');
      const empty = document.getElementById('pinned-empty');
      const pinnedCities = cities.filter(c => pinned.has(c.id));
      if (pinnedCities.length === 0) {
        list.innerHTML = '';
        empty.style.display = 'block';
        return;
      }
      empty.style.display = 'none';
      list.innerHTML = pinnedCities.map(c => `
        <li class="pinned-item" data-id="${c.id}" title="${c.name} (${c.tz})">
          <span class="pinned-code">${(c.id === 5128581 ? 'NYC' : c.country || '·').slice(0,3).toUpperCase()}</span>
          <span class="pinned-time" data-tz="${c.tz}">--:--:--</span>
          <button class="pinned-remove" data-remove="${c.id}" aria-label="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"/></svg>
          </button>
        </li>
      `).join('');
      list.querySelectorAll('.pinned-item').forEach(li => {
        li.addEventListener('click', (e) => {
          if (e.target.closest('.pinned-remove')) return;
          const id = Number(li.dataset.id);
          const city = cities.find(c => c.id === id);
          if (city && globe) {
            globe.pointOfView({ lat: city.latitude, lng: city.longitude, altitude: 1.4 }, 700);
          }
        });
      });
      list.querySelectorAll('.pinned-remove').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.stopPropagation();
          const id = Number(btn.dataset.remove);
          const city = cities.find(c => c.id === id);
          if (city) togglePin(city);
        });
      });
    }

    // ============================================================
    // Live tick (update pinned times every second)
    // ============================================================
    function startLiveTick() {
      function tick() {
        document.querySelectorAll('[data-tz]').forEach(el => {
          el.textContent = timeIn(el.dataset.tz);
        });
      }
      tick();
      setInterval(tick, 1000);
    }

    // ============================================================
    // Search
    // ============================================================
    const searchInput = document.getElementById('search');
    const searchResults = document.getElementById('search-results');
    let searchOpen = false;
    function setSearchOpen(open) {
      searchOpen = open;
      searchResults.classList.toggle('is-open', open);
    }
    searchInput.addEventListener('input', () => {
      const q = searchInput.value.trim().toLowerCase();
      if (q.length < 2) { setSearchOpen(false); return; }
      const matches = cities.filter(c =>
        c.name.toLowerCase().includes(q) ||
        (c.ascii_name || '').toLowerCase().includes(q) ||
        c.tz.toLowerCase().includes(q) ||
        c.country.toLowerCase().includes(q)
      ).slice(0, 10);
      if (matches.length === 0) {
        searchResults.innerHTML = `<div class="search-result"><div class="search-result-name">—</div></div>`;
        setSearchOpen(true);
        return;
      }
      searchResults.innerHTML = matches.map(c => `
        <button class="search-result" data-id="${c.id}">
          <span class="search-result-name">${c.name}</span>
          <span class="search-result-time" data-tz="${c.tz}">${timeIn(c.tz)}</span>
        </button>
      `).join('');
      setSearchOpen(true);
      searchResults.querySelectorAll('.search-result').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = Number(btn.dataset.id);
          const city = cities.find(c => c.id === id);
          if (city) {
            togglePin(city);
            if (globe) globe.pointOfView({ lat: city.latitude, lng: city.longitude, altitude: 1.4 }, 700);
            searchInput.value = '';
            setSearchOpen(false);
          }
        });
      });
    });
    searchInput.addEventListener('focus', () => { if (searchInput.value.trim().length >= 2) setSearchOpen(true); });
    document.addEventListener('click', (e) => {
      if (!e.target.closest('.search-wrap')) setSearchOpen(false);
    });

    // ============================================================
    // Controls
    // ============================================================
    document.getElementById('toggle-daynight').addEventListener('click', (e) => {
      e.currentTarget.setAttribute('aria-pressed', String(e.currentTarget.getAttribute('aria-pressed') === 'true' ? 'false' : 'true'));
    });
    document.getElementById('toggle-autorotate').addEventListener('click', (e) => {
      autoRotate = !autoRotate;
      e.currentTarget.setAttribute('aria-pressed', String(autoRotate));
      if (globe) globe.controls().autoRotate = autoRotate;
    });
    document.getElementById('reset-view').addEventListener('click', () => {
      if (globe) globe.pointOfView({ lat: 20, lng: 0, altitude: 2.5 }, 800);
    });

    // ============================================================
    // Boot
    // ============================================================
    loadCities().then(() => {
      if (cities.length > 0) renderPinned();
    });
  </script>
</body>
</html>
